apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: 'myapp'
      static_configs:
      - targets: ['myapp-service.myapp.svc.cluster.local:80']
      metrics_path: '/metrics'
